<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bengaluru Trip · Mar 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d1a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const data = {
      sameera: {
        name: "Sameera", color: "#f59e0b", bgColor: "rgba(245,158,11,0.08)", from: "SFO", to: "BLR",
        segments: [
          { date: "Wed, Mar 11", time: "9:40 PM PDT", type: "flight", route: "SFO → LHR", detail: "BA 286 · Conf 85YZP8 · Terminal INTL", arrive: "Arrives Mar 12, 3:10 PM GMT" },
          { date: "Thu, Mar 12", time: null, type: "layover", route: "5h 55m layover · London Heathrow" },
          { date: "Thu, Mar 12", time: "9:05 PM GMT", type: "flight", route: "LHR → BLR", detail: "AI 132 · Conf 85YZP8 · Terminal 2", arrive: "Arrives Mar 13, 12:20 PM IST" },
          { date: "Sat, Mar 14", time: "2:20 PM IST", type: "train", route: "BNC → CBE", detail: "IRCTC 20641 · Coach C6 · Seats 40, 41 · Conf 4854595115", arrive: "Arrives Mar 14, 8:40 PM IST" },
          { date: "Mon, Mar 16", time: "7:25 AM IST", type: "train", route: "CBE → BNC", detail: "IRCTC 20642 · Coach C4 · Seats 35, 36 · Conf 4234627082", arrive: "Arrives Mar 16, 1:45 PM IST" },
          { date: "Mon, Mar 30", time: "3:00 AM IST", type: "flight", route: "BLR → FRA", detail: "LH 755 · Conf 85YZP8 · Terminal 2", arrive: "Arrives Mar 30, 9:05 AM GMT+2" },
          { date: "Mon, Mar 30", time: null, type: "layover", route: "1h 20m layover · Frankfurt" },
          { date: "Mon, Mar 30", time: "10:25 AM GMT+2", type: "flight", route: "FRA → SFO", detail: "LH 454 · Conf 85YZP8 · Terminal 1", arrive: "Arrives Mar 30, 12:40 PM PDT" },
        ],
      },
      azra: {
        name: "Azra", color: "#06b6d4", bgColor: "rgba(6,182,212,0.08)", from: "SEA", to: "BLR",
        segments: [
          { date: "Wed, Mar 11", time: "5:40 PM PDT", type: "flight", route: "SEA → LHR", detail: "DL 20 · Conf JL39QS / C4SNJ3 · Gate A12", arrive: "Arrives Mar 12, 10:30 AM GMT" },
          { date: "Thu, Mar 12", time: null, type: "layover", route: "1h 25m layover · London Heathrow" },
          { date: "Thu, Mar 12", time: "11:55 AM GMT", type: "flight", route: "LHR → BLR", detail: "VS 316 · Conf JL39QS / C4SNJ3 · Terminal 3", arrive: "Arrives Mar 13, 3:20 AM IST" },
          { date: "Mon, Mar 30", time: "8:00 AM IST", type: "flight", route: "BLR → LHR", detail: "VS 317 · Conf JL39QS / C4SNJ3 · Terminal 2", arrive: "Arrives Mar 30, 2:15 PM GMT+1" },
          { date: "Mon, Mar 30", time: null, type: "layover", route: "3h 30m layover · London Heathrow" },
          { date: "Mon, Mar 30", time: "5:45 PM GMT+1", type: "flight", route: "LHR → SEA", detail: "DL 21 · Conf JL39QS / C4SNJ3 · Terminal 3", arrive: "Arrives Mar 30, 8:04 PM PDT" },
        ],
      },
    };

    const PHASES = [
      { label: "Outbound", dates: "Mar 11–13", icon: "🛫", note: "Both flying to Bengaluru via London" },
      { label: "In Bengaluru", dates: "Mar 13–30", icon: "🇮🇳", note: "Sameera takes a train to Coimbatore Mar 14–16" },
      { label: "Return", dates: "Mar 30", icon: "🛬", note: "Sameera via Frankfurt · Azra via London" },
    ];

    function SegmentCard({ seg, color, bgColor }) {
      if (seg.type === "layover") return (
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 12px", marginLeft:8, color:"#6b7280", fontSize:12, fontStyle:"italic" }}>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="#6b7280"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          {seg.route}
        </div>
      );

      const icon = seg.type === "flight"
        ? <svg viewBox="0 0 24 24" width="15" height="15" fill={color}><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
        : <svg viewBox="0 0 24 24" width="15" height="15" fill={color}><path d="M12 2c-4 0-8 .5-8 4v9.5C4 17.43 5.57 19 7.5 19L6 20.5v.5h2.23l2-2H14l2 2H18v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V6c0-3.5-3.58-4-8-4zm0 2c3.51 0 5.44.49 5.93 1H6.07C6.56 4.49 8.49 4 12 4zM6 9V7h5v2H6zm11 0h-5V7h5v2zm-1 8H8c-.83 0-1.5-.67-1.5-1.5S7.17 14 8 14h8c.83 0 1.5.67 1.5 1.5S17.83 17 17 17z"/></svg>;

      return (
        <div style={{ background:bgColor, border:`1px solid ${color}33`, borderLeft:`3px solid ${color}`, borderRadius:8, padding:"10px 14px", marginBottom:4 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                {icon}
                <span style={{ color, fontWeight:700, fontSize:15 }}>{seg.route}</span>
              </div>
              {seg.detail && <div style={{ color:"#9ca3af", fontSize:11.5, lineHeight:1.6, fontFamily:"monospace" }}>{seg.detail}</div>}
            </div>
            <span style={{ background:`${color}22`, color, fontSize:10, fontWeight:600, padding:"2px 7px", borderRadius:99, whiteSpace:"nowrap", marginLeft:8, textTransform:"uppercase", letterSpacing:"0.5px" }}>
              {seg.type}
            </span>
          </div>
          {seg.time && (
            <div style={{ marginTop:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ color:"#e5e7eb", fontSize:12, fontWeight:600 }}>Departs {seg.time}</span>
              {seg.arrive && <span style={{ color:"#6b7280", fontSize:11 }}>{seg.arrive}</span>}
            </div>
          )}
        </div>
      );
    }

    function TravelerColumn({ traveler }) {
      const grouped = {};
      traveler.segments.forEach(seg => {
        if (!grouped[seg.date]) grouped[seg.date] = [];
        grouped[seg.date].push(seg);
      });
      return (
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16, paddingBottom:12, borderBottom:`1px solid ${traveler.color}44` }}>
            <div style={{ width:36, height:36, borderRadius:"50%", background:`${traveler.color}22`, border:`2px solid ${traveler.color}`, display:"flex", alignItems:"center", justifyContent:"center", color:traveler.color, fontWeight:800, fontSize:14 }}>
              {traveler.name[0]}
            </div>
            <div>
              <div style={{ color:"#f3f4f6", fontWeight:700, fontSize:16 }}>{traveler.name}</div>
              <div style={{ color:"#6b7280", fontSize:12 }}>{traveler.from} → {traveler.to}</div>
            </div>
          </div>
          {Object.entries(grouped).map(([date, segs]) => (
            <div key={date} style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#4b5563", textTransform:"uppercase", letterSpacing:"1px", marginBottom:8, paddingLeft:4 }}>{date}</div>
              {segs.map((seg, i) => <SegmentCard key={i} seg={seg} color={traveler.color} bgColor={traveler.bgColor} />)}
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("combined");
      return (
        <div style={{ minHeight:"100vh", background:"#080d1a", color:"#f3f4f6", fontFamily:"Georgia, serif", paddingBottom:40 }}>
          <div style={{ background:"linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%)", padding:"28px 24px 24px", borderBottom:"1px solid #1e293b" }}>
            <div style={{ maxWidth:900, margin:"0 auto" }}>
              <div style={{ fontSize:11, color:"#6b7280", letterSpacing:"2px", textTransform:"uppercase", marginBottom:6 }}>Trip Itinerary</div>
              <h1 style={{ margin:0, fontSize:26, fontWeight:400, color:"#f9fafb" }}>Bengaluru · March 2026</h1>
              <div style={{ marginTop:8, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
                <span style={{ display:"flex", alignItems:"center", gap:6, color:"#f59e0b", fontSize:13 }}>
                  <span style={{ width:8, height:8, borderRadius:"50%", background:"#f59e0b", display:"inline-block" }} /> Sameera · SFO
                </span>
                <span style={{ color:"#374151" }}>·</span>
                <span style={{ display:"flex", alignItems:"center", gap:6, color:"#06b6d4", fontSize:13 }}>
                  <span style={{ width:8, height:8, borderRadius:"50%", background:"#06b6d4", display:"inline-block" }} /> Azra · SEA
                </span>
                <span style={{ color:"#374151" }}>·</span>
                <span style={{ color:"#6b7280", fontSize:13 }}>20 days</span>
              </div>
            </div>
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"0 16px" }}>
            <div style={{ display:"flex", gap:8, marginTop:20, marginBottom:20 }}>
              {PHASES.map((p, i) => (
                <div key={i} style={{ flex:1, background:"#0f172a", border:"1px solid #1e293b", borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ fontSize:18, marginBottom:4 }}>{p.icon}</div>
                  <div style={{ fontWeight:700, fontSize:13, color:"#e5e7eb" }}>{p.label}</div>
                  <div style={{ fontSize:11, color:"#f59e0b", marginBottom:4 }}>{p.dates}</div>
                  <div style={{ fontSize:11, color:"#6b7280", lineHeight:1.5 }}>{p.note}</div>
                </div>
              ))}
            </div>

            <div style={{ display:"flex", gap:4, marginBottom:20, background:"#0f172a", border:"1px solid #1e293b", borderRadius:8, padding:4, width:"fit-content" }}>
              {["combined","sameera","azra"].map(v => (
                <button key={v} onClick={() => setView(v)} style={{
                  padding:"6px 16px", borderRadius:6, border:"none", cursor:"pointer", fontSize:12, fontWeight:600,
                  textTransform:"capitalize", letterSpacing:"0.3px",
                  background: view===v ? (v==="sameera" ? "#f59e0b22" : v==="azra" ? "#06b6d422" : "#1e293b") : "transparent",
                  color: view===v ? (v==="sameera" ? "#f59e0b" : v==="azra" ? "#06b6d4" : "#e5e7eb") : "#6b7280",
                }}>
                  {v==="combined" ? "⊕ Combined" : v==="sameera" ? "● Sameera" : "● Azra"}
                </button>
              ))}
            </div>

            {view === "combined" ? (
              <div style={{ display:"flex", gap:16, alignItems:"flex-start" }}>
                <TravelerColumn traveler={data.sameera} />
                <div style={{ width:1, background:"#1e293b", alignSelf:"stretch", margin:"0 4px" }} />
                <TravelerColumn traveler={data.azra} />
              </div>
            ) : (
              <div style={{ maxWidth:480 }}>
                <TravelerColumn traveler={view==="sameera" ? data.sameera : data.azra} />
              </div>
            )}

            <div style={{ marginTop:28, background:"#0f172a", border:"1px solid #1e293b", borderRadius:10, padding:"16px 20px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#6b7280", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:12 }}>Confirmation Numbers</div>
              <div style={{ display:"flex", gap:32, flexWrap:"wrap" }}>
                <div>
                  <div style={{ color:"#f59e0b", fontSize:12, fontWeight:600, marginBottom:6 }}>Sameera</div>
                  <div style={{ fontFamily:"monospace", fontSize:13, color:"#e5e7eb", letterSpacing:"1px", lineHeight:1.8 }}>
                    <div><span style={{ color:"#6b7280" }}>Flights: </span>85YZP8</div>
                    <div><span style={{ color:"#6b7280" }}>Train 1: </span>4854595115</div>
                    <div><span style={{ color:"#6b7280" }}>Train 2: </span>4234627082</div>
                  </div>
                </div>
                <div>
                  <div style={{ color:"#06b6d4", fontSize:12, fontWeight:600, marginBottom:6 }}>Azra</div>
                  <div style={{ fontFamily:"monospace", fontSize:13, color:"#e5e7eb", letterSpacing:"1px", lineHeight:1.8 }}>
                    <div><span style={{ color:"#6b7280" }}>Conf 1: </span>JL39QS</div>
                    <div><span style={{ color:"#6b7280" }}>Conf 2: </span>C4SNJ3</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
